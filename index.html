<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AK LIUZHANG | 官方主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #fafafa;
      color: #222;
    }

    /* 导航栏 */
    .nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 20px;
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .nav-menu a {
      margin-left: 30px;
      color: #333;
      text-decoration: none;
      font-size: 15px;
    }
    .nav-menu a.active {
      font-weight: bold;
      color: #000;
    }

    /* 首页内容 */
    .home-hero {
      max-width: 1100px;
      margin: 100px auto;
      text-align: center;
      padding: 0 20px;
    }
    .home-hero h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .home-hero p {
      color: #666;
      font-size: 17px;
      line-height: 1.8;
    }

    /* ====================== */
    /* 手机自适应（已优化） */
    /* ====================== */
    @media (max-width: 768px) {
      .nav {
        flex-direction: column;
        gap: 18px;
        padding: 25px 15px;
        text-align: center;
      }
      .nav-menu {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px 14px;
      }
      .nav-menu a {
        margin-left: 0;
        font-size: 14px;
      }
      .home-hero {
        margin: 60px auto 80px;
        padding: 0 20px;
      }
      .home-hero h1 {
        font-size: 34px;
      }
      .home-hero p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="nav">
    <div class="logo">AK LIUZHANG</div>
    <div class="nav-menu">
      <a href="index.html" class="active">首页</a>
      <a href="profile.html">档案</a>
      <a href="works.html">音乐作品</a>
      <a href="tour.html">行程活动</a>
      <a href="https://weibo.com/n/AK%E5%88%98%E5%BD%B0-OFFICIAL" target="_blank">周边</a>
    </div>
  </div>

  <div class="home-hero">
    <h1>AK 刘彰</h1>
    <p>创作音乐人 · 说唱唱作人<br>以音乐为载体，表达思考与态度</p>
  </div>
</body>
</html>
